<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AyuMed AI | Premium Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy-900: #0D1B2A; --gold: #D4AF37; --cream: #F7F3E9; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%;
            background-color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            color: var(--navy-900);
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Header */
        .chat-header {
            background-color: var(--navy-900);
            color: var(--gold);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(13, 27, 42, 0.2);
            z-index: 10;
        }

        .chat-header .back-btn {
            color: var(--cream);
            text-decoration: none;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .chat-header .back-btn:hover { color: var(--gold); transform: translateX(-3px); }

        .chat-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header img {
            height: 35px;
            width: 35px;
            border-radius: 50%;
            border: 1px solid var(--gold);
        }

        /* Central Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            background: #FFFFFF;
            box-shadow: 0 0 30px rgba(13,27,42,0.05);
            border-left: 1px solid rgba(212,175,55,0.2);
            border-right: 1px solid rgba(212,175,55,0.2);
            overflow: hidden;
        }

        .chat-body {
            flex: 1;
            padding: 30px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-image: radial-gradient(rgba(212, 175, 55, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Message Bubbles */
        .message-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .wrapper-ai { align-self: flex-start; }
        .wrapper-user { align-self: flex-end; }

        .message {
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1rem;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .msg-ai {
            background: #FFFFFF;
            color: var(--navy-900);
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(13, 27, 42, 0.1);
        }

        .msg-user {
            background: var(--navy-900);
            color: var(--cream);
            border-bottom-right-radius: 2px;
        }

        .msg-ai b { color: var(--navy-900); font-weight: 700; }
        .msg-ai ul { margin-left: 20px; margin-top: 10px; margin-bottom: 10px; }

        .sender-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            opacity: 0.7;
        }
        .wrapper-ai .sender-label { color: var(--navy-900); margin-left: 5px; }
        .wrapper-user .sender-label { color: var(--navy-900); text-align: right; margin-right: 5px; }

        /* Input Area */
        .chat-input-area {
            padding: 20px;
            background: #FFFFFF;
            border-top: 1px solid rgba(13, 27, 42, 0.1);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 16px 20px;
            border: 1px solid rgba(13, 27, 42, 0.2);
            border-radius: 30px;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
            background: var(--cream);
        }

        .chat-input-area input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            background: #FFFFFF;
        }

        .chat-input-area button {
            background: var(--gold);
            color: var(--navy-900);
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .chat-input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
        }

/* --- AI Suggestion Chips --- */
.suggestions-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 15px;
    background-color: transparent;
}

.suggestion-chip {
    background-color: #F7F3E9;
    border: 1px solid #D4AF37;
    color: #0D1B2A;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Montserrat', sans-serif;
}

.suggestion-chip:hover {
    background-color: #D4AF37;
    color: #ffffff;
    transform: translateY(-2px);
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

        /* Typing Indicator Animation */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 15px 20px;
            background: #FFFFFF;
            border-radius: 12px;
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(13, 27, 42, 0.1);
            width: fit-content;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--gold);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            .chat-container { border: none; box-shadow: none; }
            .message-wrapper { max-width: 90%; }
        }
    </style>
</head>
<body>

    <header class="chat-header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1>AyuMed AI <i class="fas fa-check-circle" style="font-size: 0.9rem;"></i></h1>
        <img src="https://i.postimg.cc/zXZtfMHn/1000627648.jpg" alt="AyuMed Logo">
    </header>

    <div class="chat-container">
        <div class="chat-body" id="chatBody">
            <div class="message-wrapper wrapper-ai">
                <div class="sender-label">AyuMed AI</div>
                <div class="message msg-ai">
                    Hello! I am the official AyuMed AI Assistant. I can guide you through our admission process, fee structure, document requirements, and college predictions. How can I assist you today?
                </div>
            </div>
        </div>

<!-- Suggestion Chips Container -->
<div id="ai-suggestions" class="suggestions-container">
    <button class="suggestion-chip" onclick="sendSuggestion('What is AyuMed?')">What is AyuMed?</button>
    <button class="suggestion-chip" onclick="sendSuggestion('Services Offered')">Services Offered</button>
    <button class="suggestion-chip" onclick="sendSuggestion('Detailed Overview of Services')">Detailed Overview of Services</button>
    <button class="suggestion-chip" onclick="sendSuggestion('How will be the Counselling process?')">How will be the Counselling process?</button>
    <button class="suggestion-chip" onclick="sendSuggestion('How to register on AyuMed?')">How to register on AyuMed?</button>
    <button class="suggestion-chip" onclick="sendSuggestion('What are the documents required for Neet UG Counselling?')">What are the documents required for Neet UG Counselling?</button>
</div>
        
        <div class="message-wrapper wrapper-ai" id="typingIndicatorWrapper" style="display: none; padding: 0 20px;">
            <div class="sender-label">AyuMed AI is typing...</div>
            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type your message here..." onkeypress="handleChatEnter(event)">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
    // Function to handle Suggestion Clicks
    function sendSuggestion(keyword) {
        // Hide the suggestions after a choice is made
        document.getElementById('ai-suggestions').style.display = 'none';
        
        // Grab your specific input field
        let inputField = document.getElementById('chatInput'); 
        inputField.value = keyword;
        
        // Trigger your specific send function
        sendMessage(); 
    }

    // Smart AI Typewriter Effect
    function typeWriterEffect(element, htmlString, speed = 15) {
        element.innerHTML = "";
        let i = 0;
        let isTag = false;
        let text = "";

        function type() {
            if (i < htmlString.length) {
                let char = htmlString.charAt(i);
                text += char;
                element.innerHTML = text;
                i++;

                // Check if we are typing inside an HTML tag (like <b> or <br>)
                if (char === '<') isTag = true;
                if (char === '>') isTag = false;

                if (isTag) {
                    type();
                } else {
                    // Keep chat scrolled to the bottom while typing
                    let chatBox = document.getElementById('chatBody'); 
                    chatBox.scrollTop = chatBox.scrollHeight;
                    setTimeout(type, speed);
                }
            }
        }
        type();
    }

        function handleChatEnter(event) {
            if (event.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const messageText = input.value.trim();
            if (!messageText) return;

            const chatBody = document.getElementById('chatBody');
            const typingWrapper = document.getElementById('typingIndicatorWrapper');
            const typingIndicator = document.getElementById('typingIndicator');

            // 1. Append User Message
            const userHTML = `
                <div class="message-wrapper wrapper-user">
                    <div class="sender-label">You</div>
                    <div class="message msg-user">${messageText}</div>
                </div>
            `;
            chatBody.insertAdjacentHTML('beforeend', userHTML);
            input.value = '';
            
            // 2. Scroll & Show Typing Indicator
            chatBody.scrollTop = chatBody.scrollHeight;
            typingWrapper.style.display = "block";
            typingIndicator.style.display = "flex";
            chatBody.appendChild(typingWrapper); 
            chatBody.scrollTop = chatBody.scrollHeight;

            try {
                // 3. Call Python Backend API
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: messageText })
                });

                const data = await response.json();
                
                // 4. Hide Typing Indicator & Append AI Reply
                typingWrapper.style.display = "none";
                
                if (response.ok) {
                            // Create a unique ID for this specific AI message
        const uniqueId = 'ai-msg-' + Date.now(); 

        const aiHTML = `
            <div class="message-wrapper wrapper-ai">
                <div class="sender-label">AyuMed AI</div>
                <div class="message msg-ai" id="${uniqueId}"></div>
            </div>
        `;
        chatBody.insertAdjacentHTML('beforeend', aiHTML);

        // Grab that empty div and trigger the typewriter engine!
        const botMessageElement = document.getElementById(uniqueId);
        typeWriterEffect(botMessageElement, data.reply, 15);
                } else {
                    chatBody.insertAdjacentHTML('beforeend', `<div class="message-wrapper wrapper-ai"><div class="message msg-ai" style="color:red;">Error connecting to AI Server.</div></div>`);
                }
            } catch (error) {
                typingWrapper.style.display = "none";
                chatBody.insertAdjacentHTML('beforeend', `<div class="message-wrapper wrapper-ai"><div class="message msg-ai" style="color:red;">Network Error. Please check your connection.</div></div>`);
            }
            
            chatBody.scrollTop = chatBody.scrollHeight;
        }
    </script>
</body>
</html>
