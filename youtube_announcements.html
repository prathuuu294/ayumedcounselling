<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyuMed | YouTube Announcements</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy-900: #0D1B2A; --gold: #D4AF37; --cream: #F7F3E9; --yt-red: #FF0000; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: var(--cream); color: var(--navy-900); }
        
        .hero { background: var(--navy-900); color: white; padding: 80px 20px; text-align: center; position: relative; overflow: hidden; }
        .hero::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: url('https://i.postimg.cc/zXZtfMHn/1000627648.jpg') center/cover; opacity: 0.05; pointer-events: none; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--gold); margin: 0 0 15px 0; position: relative; z-index: 1; }
        .hero p { font-size: 1.1rem; max-width: 600px; margin: 0 auto; color: #ccc; position: relative; z-index: 1; }
        
        .video-grid { max-width: 1200px; margin: -40px auto 60px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; position: relative; z-index: 2; }
        
        .video-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 35px rgba(13,27,42,0.1); transition: 0.3s ease; text-decoration: none; display: flex; flex-direction: column; border: 1px solid rgba(212,175,55,0.2); }
        .video-card:hover { transform: translateY(-8px); box-shadow: 0 25px 45px rgba(13,27,42,0.15); border-color: var(--gold); }
        
        .thumbnail-wrapper { position: relative; width: 100%; padding-top: 56.25%; /* 16:9 Aspect Ratio */ background: #000; overflow: hidden; }
        .thumbnail-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; opacity: 0.9; }
        .video-card:hover .thumbnail-img { transform: scale(1.05); opacity: 1; }
        
        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 3.5rem; opacity: 0.8; transition: 0.3s; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
        .video-card:hover .play-btn { color: var(--yt-red); opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        
        .video-info { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .video-date { font-size: 0.85rem; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .video-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--navy-900); margin: 0; line-height: 1.4; font-weight: 700; }
        
        .back-nav { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .back-nav a { color: var(--navy-900); text-decoration: none; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .back-nav a:hover { color: var(--gold); }
        
        /* Loader */
        .loader { text-align: center; padding: 50px; grid-column: 1 / -1; font-weight: 600; color: var(--navy-900); }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back to AyuMed Home</a>
    </div>

    <div class="hero">
        <h1>AyuMed on YouTube</h1>
        <p>Watch the latest admission guides, cut-off analyses, and premium counselling strategies directly from our experts.</p>
    </div>

    <div class="video-grid" id="videoContainer">
        <div class="loader"><i class="fas fa-spinner fa-spin"></i> Fetching latest videos...</div>
    </div>

    <script>
        // Magic Function: Extracts video ID from ANY valid YouTube link
        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function loadVideos() {
            const container = document.getElementById('videoContainer');
            try {
                // Ensure this URL matches your PythonAnywhere domain exactly
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/youtube'); 
                const videos = await response.json();
                
                container.innerHTML = '';
                
                if (videos.length === 0) {
                    container.innerHTML = '<div class="loader">No videos posted yet. Check back soon!</div>';
                    return;
                }

                videos.forEach(vid => {
                    const videoId = getYouTubeId(vid.link);
                    // Fetch High Quality default thumbnail automatically
                    const thumbUrl = videoId ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` : 'https://i.postimg.cc/zXZtfMHn/1000627648.jpg';
                    
                    // Format Date nicely
                    const dateObj = new Date(vid.date);
                    const formattedDate = dateObj.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

                    const cardHTML = `
                        <a href="${vid.link}" target="_blank" class="video-card">
                            <div class="thumbnail-wrapper">
                                <img src="${thumbUrl}" alt="Thumbnail" class="thumbnail-img" onerror="this.src='https://i.postimg.cc/zXZtfMHn/1000627648.jpg'">
                                <i class="fab fa-youtube play-btn"></i>
                            </div>
                            <div class="video-info">
                                <div class="video-date"><i class="far fa-calendar-alt"></i> ${formattedDate}</div>
                                <h3 class="video-title">${vid.title}</h3>
                            </div>
                        </a>
                    `;
                    container.innerHTML += cardHTML;
                });
            } catch (error) {
                container.innerHTML = '<div class="loader" style="color: red;">Failed to load videos. Please try again later.</div>';
            }
        }

        // Load instantly when page opens
        loadVideos();
    </script>
</body>
</html>
