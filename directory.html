<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyuMed | Medical College Directory & Predictor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy-900: #0D1B2A; 
            --navy-800: #1B263B; 
            --navy-600: #415A77; 
            --gold: #D4AF37;     
            --cream: #F7F3E9;    
            --shadow-luxury: 0 10px 30px rgba(13, 27, 42, 0.08);
        }

        body {
            background-color: var(--cream);
            color: var(--navy-900);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* Minimal Header for Directory */
        header {
            background-color: var(--navy-900);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
        }

        .logo-text { font-size: 24px; font-weight: 700; color: var(--cream); text-decoration: none; }
        .logo-text span { color: var(--gold); font-style: italic; }
        .back-btn { color: var(--cream); text-decoration: none; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; border: 1px solid var(--gold); padding: 8px 15px; border-radius: 4px; transition: 0.3s;}
        .back-btn:hover { background: var(--gold); color: var(--navy-900); }

        /* Directory Hero */
        .directory-hero {
            text-align: center;
            padding: 60px 20px 40px;
        }
        .directory-hero h1 { font-size: 2.5rem; color: var(--navy-900); margin-bottom: 10px; }
        .directory-hero p { color: var(--navy-600); max-width: 600px; margin: 0 auto; font-weight: 500; }

        /* Search & Filter Bar */
        .filter-container {
            max-width: 1100px;
            margin: 0 auto 40px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow-luxury);
            border-top: 3px solid var(--gold);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 1px solid rgba(13,27,42,0.2);
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            color: var(--navy-900);
        }
        .filter-input:focus { outline: none; border-color: var(--gold); }

        /* College Grid */
        .college-grid {
            max-width: 1100px;
            margin: 0 auto 80px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* College Card Design */
        .college-card {
            background: white;
            border-radius: 8px;
            box-shadow: var(--shadow-luxury);
            border: 1px solid rgba(212, 175, 55, 0.2);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .college-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(13, 27, 42, 0.15);
            border-color: var(--gold);
        }

        .card-header {
            background: var(--navy-900);
            color: white;
            padding: 20px;
            position: relative;
        }

        .card-header h3 { margin: 0; font-size: 1.2rem; line-height: 1.4; padding-right: 60px;}
        
        .course-badge {
            position: absolute;
            top: 20px; right: 20px;
            background: var(--gold);
            color: var(--navy-900);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .card-body { padding: 20px; flex-grow: 1; }
        
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(13,27,42,0.1);
            font-size: 0.9rem;
        }
        .data-row:last-child { border-bottom: none; }
        .data-label { color: var(--navy-600); font-weight: 600; }
        .data-value { color: var(--navy-900); font-weight: 700; text-align: right; }

        .cutoff-box {
            background: rgba(212, 175, 55, 0.1);
            border: 1px dashed var(--gold);
            padding: 12px;
            border-radius: 4px;
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
            color: var(--navy-900);
        }
        .cutoff-score { color: #dc2743; font-size: 1.2rem; font-weight: 700; margin-left: 5px; }

        .btn-enquire {
            background: #25D366;
            color: white;
            text-align: center;
            padding: 15px;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s;
        }
        .btn-enquire:hover { background: #1ebc59; }

        .loading-state { text-align: center; grid-column: 1 / -1; padding: 50px; color: var(--navy-600); font-weight: 600; font-size: 1.1rem; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-text">Ayu<span>Med</span></a>
        <a href="index.html" class="back-btn">Return Home</a>
    </header>

    <div class="directory-hero">
        <h1>College Predictor & Directory</h1>
        <p>Filter by state, course, or type to find the exact seat intake, tuition fees, and expected cut-offs for medical colleges across India.</p>
    </div>

    <div class="filter-container">
        <input type="text" id="searchName" class="filter-input" placeholder="Search college name..." onkeyup="filterColleges()">
        
        <select id="filterCourse" class="filter-input" onchange="filterColleges()">
            <option value="All">All Courses</option>
            <option value="MBBS">MBBS</option>
            <option value="BDS">BDS</option>
            <option value="BAMS">BAMS</option>
            <option value="BHMS">BHMS</option>
        </select>

        <select id="filterState" class="filter-input" onchange="filterColleges()">
            <option value="All">All States</option>
            <option value="Maharashtra">Maharashtra</option>
            <option value="Madhya Pradesh">Madhya Pradesh</option>
            <option value="All India">All India</option>
        </select>

        <select id="filterType" class="filter-input" onchange="filterColleges()">
            <option value="All">All Types</option>
            <option value="Government">Government</option>
            <option value="Private">Private</option>
            <option value="Deemed">Deemed</option>
        </select>
    </div>

    <div class="college-grid" id="collegeGrid">
        <div class="loading-state">Connecting to AyuMed Secure Database...</div>
    </div>

    <script>
        let allColleges = []; // Holds the master list from the database

        // 1. Fetch the data securely from PythonAnywhere
        async function fetchColleges() {
            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/colleges');
                allColleges = await response.json();
                renderColleges(allColleges); // Display them all initially
            } catch (error) {
                console.error("Error fetching colleges:", error);
                document.getElementById('collegeGrid').innerHTML = '<div class="loading-state" style="color: #dc2743;">Error loading database. Please try again.</div>';
            }
        }

        // 2. Build the HTML Cards
        function renderColleges(collegesToDisplay) {
            const grid = document.getElementById('collegeGrid');
            grid.innerHTML = ''; // Clear current cards

            if (collegesToDisplay.length === 0) {
                grid.innerHTML = '<div class="loading-state">No colleges found matching your exact filters. Try adjusting your search!</div>';
                return;
            }

            collegesToDisplay.forEach(col => {
                // Formatting the WhatsApp Message dynamically
                const waMessage = encodeURIComponent(`Hello AyuMed, I am interested in admission guidance for ${col.name} (${col.course}). My expected score is around ${col.cutoff}.`);
                
                grid.innerHTML += `
                    <div class="college-card">
                        <div class="card-header">
                            <div class="course-badge">${col.course}</div>
                            <h3>${col.name}</h3>
                        </div>
                        <div class="card-body">
                            <div class="data-row"><span class="data-label">State</span><span class="data-value">${col.state}</span></div>
                            <div class="data-row"><span class="data-label">Institution Type</span><span class="data-value">${col.type}</span></div>
                            <div class="data-row"><span class="data-label">Total Seat Intake</span><span class="data-value">${col.seats}</span></div>
                            <div class="data-row"><span class="data-label">Annual Tuition Fee</span><span class="data-value">${col.fee}</span></div>
                            
                            <div class="cutoff-box">
                                Expected Safe Score: <span class="cutoff-score">${col.cutoff}+</span>
                            </div>
                        </div>
                        <a href="https://wa.me/917879078367?text=${waMessage}" target="_blank" class="btn-enquire">Enquire Now</a>
                    </div>
                `;
            });
        }

        // 3. The Filter Engine
        function filterColleges() {
            const searchTerm = document.getElementById('searchName').value.toLowerCase();
            const courseFilter = document.getElementById('filterCourse').value;
            const stateFilter = document.getElementById('filterState').value;
            const typeFilter = document.getElementById('filterType').value;

            const filteredList = allColleges.filter(col => {
                const matchesName = col.name.toLowerCase().includes(searchTerm);
                const matchesCourse = courseFilter === 'All' || col.course === courseFilter;
                const matchesState = stateFilter === 'All' || col.state === stateFilter;
                const matchesType = typeFilter === 'All' || col.type === typeFilter;

                return matchesName && matchesCourse && matchesState && matchesType;
            });

            renderColleges(filteredList);
        }

        // Run the fetch command as soon as the page loads
        window.addEventListener('DOMContentLoaded', fetchColleges);
    </script>
</body>
</html>
