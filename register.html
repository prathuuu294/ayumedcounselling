<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyuMed | Student Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy-900: #0D1B2A; 
            --gold: #D4AF37;     
            --cream: #F7F3E9;    
            --shadow-luxury: 0 15px 35px rgba(13, 27, 42, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-container {
            background: #FFFFFF;
            width: 100%;
            max-width: 500px;
            border-top: 4px solid var(--gold);
            border-radius: 12px;
            box-shadow: var(--shadow-luxury);
            padding: 40px;
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h1 { font-family: 'Playfair Display', serif; color: var(--navy-900); font-size: 2.2rem; margin-bottom: 10px; }
        .auth-header p { color: #666; font-size: 0.95rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: var(--navy-900); font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; }
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-size: 1rem; }
        
        /* Password wrapper styles */
        .pwd-wrapper { position: relative; width: 100%; }
        .pwd-wrapper input { padding-right: 45px; }
        .pwd-wrapper i { position: absolute; right: 15px; top: 16px; cursor: pointer; color: #888; }
        
        .btn-submit { width: 100%; padding: 16px; background: var(--gold); color: var(--navy-900); border: none; border-radius: 6px; font-size: 1.05rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .auth-footer { text-align: center; margin-top: 25px; font-size: 0.9rem; }
        .auth-footer a { color: var(--gold); font-weight: 600; text-decoration: none; }
        .error-message { color: #dc2743; text-align: center; font-size: 0.9rem; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join AyuMed to track your admission journey.</p>
        </div>

        <div id="errorMsg" class="error-message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="regPhone" placeholder="+91" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="student@example.com" required>
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <div class="pwd-wrapper">
                    <input type="password" id="regPassword" placeholder="Minimum 6 characters" required>
                    <i class="fas fa-eye" onclick="togglePassword('regPassword', this)"></i>
                </div>
            </div>
            <button type="submit" class="btn-submit">Sign Up</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log In Here</a>
        </div>
    </div>

    <script>
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.querySelector('.btn-submit');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerText = 'Creating Account...';
            errorMsg.style.display = 'none';

            const data = {
                name: document.getElementById('regName').value,
                phone: document.getElementById('regPhone').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            };

            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    alert("Account created successfully! Please log in.");
                    window.location.href = 'login.html';
                } else {
                    errorMsg.innerText = result.message || 'Registration failed.';
                    errorMsg.style.display = 'block';
                    btn.innerText = 'Sign Up';
                }
            } catch (error) {
                errorMsg.innerText = 'Connection error. Please try again.';
                errorMsg.style.display = 'block';
                btn.innerText = 'Sign Up';
            }
        });
    </script>
</body>
</html>
