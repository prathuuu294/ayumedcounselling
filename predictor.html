<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyuMed | AI College Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy-900: #0D1B2A; --gold: #D4AF37; --cream: #F7F3E9; }
        body { background-color: var(--cream); font-family: 'Montserrat', sans-serif; color: var(--navy-900); margin: 0; padding: 0; }
        
        .header { background: var(--navy-900); padding: 20px 0; text-align: center; border-bottom: 4px solid var(--gold); }
        .header h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin: 0; font-size: 2.2rem; }
        .header p { color: #fff; margin-top: 5px; font-weight: 300; }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        
        .predictor-card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 4px solid var(--navy-900); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-size: 1rem; box-sizing: border-box; }
        
        button { width: 100%; background: var(--navy-900); color: var(--gold); border: none; padding: 15px; border-radius: 6px; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: var(--gold); color: var(--navy-900); }

        #results { margin-top: 40px; display: none; }
        .result-card { background: #fff; border-left: 5px solid; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .col-name { font-weight: 700; font-size: 1.1rem; color: var(--navy-900); margin-bottom: 5px; }
        .col-details { font-size: 0.85rem; color: #555; }
        .chance-badge { padding: 8px 15px; border-radius: 20px; font-weight: 700; font-size: 0.85rem; color: #fff; text-align: center; min-width: 120px;}
        
        .cta-box { background: rgba(212, 175, 55, 0.1); padding: 20px; text-align: center; border-radius: 8px; margin-top: 30px; border: 1px dashed var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <h1>AyuMed AI Predictor</h1>
        <p>Data-Driven Admission Probabilities</p>
    </div>

    <div class="container">
        <div class="predictor-card">
            <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 25px; text-align: center;">Find Your Probable Colleges</h2>
            
            <div class="form-group">
                <label>Your Expected NEET Score (out of 720)</label>
                <input type="number" id="marks" placeholder="e.g. 580" required>
            </div>
            
            <div class="form-group">
                <label>Target Course</label>
                <select id="course">
                    <option value="MBBS">MBBS</option>
                    <option value="BDS">BDS</option>
                    <option value="BAMS">BAMS</option>
                    <option value="BHMS">BHMS</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Target State</label>
                <select id="state">
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Madhya Pradesh">Madhya Pradesh</option>
                </select>
            </div>

            <button onclick="runPredictor()" id="predictBtn"><i class="fas fa-magic"></i> Generate Prediction</button>
        </div>

        <div id="results">
            <h3 style="font-family: 'Playfair Display', serif; margin-bottom: 20px;">Top Predicted Results</h3>
            <div id="result-list"></div>
            
            <div class="cta-box">
                <h4 style="margin-bottom: 10px; color: var(--navy-900);">Want the full, customized choice-filling list?</h4>
                <p style="font-size: 0.9rem; margin-bottom: 15px;">Our AI is a great starting point, but expert human counselling secures the seat.</p>
                <a href="login.html" style="background: var(--gold); color: var(--navy-900); padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 4px;">Register for Premium Counselling</a>
            </div>
        </div>
    </div>

    <script>
        async function runPredictor() {
            const marks = document.getElementById('marks').value;
            const course = document.getElementById('course').value;
            const state = document.getElementById('state').value;
            const btn = document.getElementById('predictBtn');
            const resultList = document.getElementById('result-list');

            if(!marks) { alert("Please enter your expected score."); return; }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing Data...';
            
            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ marks, course, state })
                });
                
                const data = await response.json();
                
                if(data.status === "success") {
                    resultList.innerHTML = "";
                    
                    if(data.predictions.length === 0) {
                        resultList.innerHTML = `<p style="text-align:center; color: red; font-weight: bold;">No colleges found within this score range. Consider lowering your target or exploring management quota options.</p>`;
                    } else {
                        data.predictions.forEach(col => {
                            resultList.innerHTML += `
                                <div class="result-card" style="border-left-color: ${col.color};">
                                    <div>
                                        <div class="col-name">${col.name}</div>
                                        <div class="col-details"><i class="fas fa-map-marker-alt"></i> ${col.state} &nbsp;|&nbsp; <i class="fas fa-info-circle"></i> ${col.college_type}</div>
                                        <div class="col-details" style="margin-top:5px; font-weight:600;">Last Year Cutoff: ${col.expected_cutoff}</div>
                                    </div>
                                    <div class="chance-badge" style="background-color: ${col.color};">${col.chance}</div>
                                </div>
                            `;
                        });
                    }
                    
                    document.getElementById('results').style.display = 'block';
                }
            } catch (error) {
                alert("Error connecting to predictor engine.");
            }
            
            btn.innerHTML = '<i class="fas fa-magic"></i> Generate Prediction';
        }
    </script>
</body>
</html>
