<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyuMed | Medical Counselling Insights & Articles</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0D1B2A; --gold: #D4AF37; --cream: #F7F3E9; --white: #FFFFFF; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--cream); color: var(--navy); margin: 0; padding: 0; }
        .navbar { background: var(--navy); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
        .brand { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.8rem; text-decoration: none; }
        .container { max-width: 900px; margin: 50px auto; padding: 0 20px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; text-align: center; margin-bottom: 40px; }
        .blog-card { background: var(--white); padding: 35px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 35px; border-left: 5px solid var(--gold); }
        .blog-date { font-size: 0.85rem; color: #666; font-weight: 600; text-transform: uppercase; }
        .blog-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 10px 0 15px 0; color: var(--navy); }
        .blog-content { line-height: 1.8; font-size: 1.05rem; color: #333; }
        .blog-content p { margin-bottom: 15px; }
        .blog-content blockquote { border-left: 3px solid var(--gold); padding-left: 15px; font-style: italic; margin: 20px 0; color: #555; }
.author-bio {
    display: flex;
    align-items: center;
    gap: 20px;
    background: #FFFFFF;
    padding: 25px;
    border-radius: 8px;
    margin-top: 40px;
    border-top: 4px solid var(--gold);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}
.author-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--gold);
}
.author-details h4 {
    margin: 0 0 5px 0;
    font-family: 'Playfair Display', serif;
    color: var(--navy);
    font-size: 1.2rem;
}
.author-details p {
    margin: 0;
    font-size: 0.95rem;
    color: #555;
    line-height: 1.5;
}
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="brand">AyuMed Insights</a>
    </nav>

    <main class="container">
        <h1>Latest Counselling Frameworks</h1>
        <div id="blogContainer">
            <!-- Dynamic feeds arrive via JavaScript API -->
        </div>
    </main>

    <script>
        async function loadBlogs() {
            const container = document.getElementById('blogContainer');
            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/blogs');
                const blogs = await response.json();
                
                if(blogs.length === 0) {
                    container.innerHTML = '<p style="text-align:center; font-style:italic;">Fresh updates coming soon. Stay tuned!</p>';
                    return;
                }
                
                container.innerHTML = '';
                blogs.forEach(post => {
                    const cleanDate = new Date(post.date).toLocaleDateString('en-US', {month: 'long', day: 'numeric', year: 'numeric'});
                    container.innerHTML += `
                        <article class="blog-card">
                            <div class="blog-date">${cleanDate}</div>
                            <h2 class="blog-title">${post.title}</h2>
                            <div class="blog-content">${post.content}</div>
<div class="author-bio">
    <img src="https://i.postimg.cc/FHvBTq9X/1000627881.jpg" alt="Prathamesh Sanjay Salunke" class="author-avatar">
    <div class="author-details">
        <h4>Prathamesh Sanjay Salunke</h4>
        <p>Lead Advisor at AyuMed. 2nd Year BDS Student at Nair Hospital Dental College, Mumbai. Dedicated to guiding the next generation of medical and dental professionals.</p>
    </div>
</div>
                        </article>
                    `;
                });
            } catch (error) {
                container.innerHTML = '<p style="color:red; text-align:center;">Failed to sync live data hub.</p>';
            }
        }
        window.onload = loadBlogs;
    </script>
</body>
</html>
