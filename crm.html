<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyuMed | CRM Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-900: #0D1B2A; 
            --gold: #D4AF37;     
            --cream: #F7F3E9;    
            --success: #25D366;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f7f6; color: var(--navy-900); padding-bottom: 50px; }
        
        .crm-header {
            background: var(--navy-900);
            padding: 20px 40px;
            color: var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--gold);
        }
        .crm-header h1 { font-family: 'Playfair Display', serif; }
        
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        
        .lead-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid var(--gold);
            display: grid;
            grid-template-columns: 2fr 1.5fr 2fr 1fr;
            gap: 20px;
            align-items: start;
        }
        
        .lead-info h3 { font-size: 1.2rem; margin-bottom: 5px; color: var(--navy-900); }
        .lead-info p { font-size: 0.85rem; color: #555; margin-bottom: 3px; }
        
        .form-control {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        textarea.form-control { resize: vertical; min-height: 80px; }
        
        .btn-update {
            background: var(--navy-900);
            color: var(--gold);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }
        .btn-update:hover { background: var(--gold); color: var(--navy-900); }
        
        .btn-wa {
            display: inline-block;
            background: var(--success);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .doc-badge {
            display: inline-block;
            padding: 5px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            margin-right: 5px;
            margin-bottom: 5px;
            text-decoration: none;
        }
        .doc-yes { background: rgba(37, 211, 102, 0.15); color: #1da851; border: 1px solid #1da851; }
        .doc-no { background: #eee; color: #999; border: 1px solid #ddd; pointer-events: none; }
        
        .doc-yes:hover { background: #1da851; color: white; }

        @media(max-width: 900px) {
            .lead-card { grid-template-columns: 1fr; }
        }
/* CRM Admin Action Toolbar */
.admin-actions {
    grid-column: 1 / -1; 
    display: flex;
    gap: 15px;
    margin-top: 15px;
    padding-top: 15px;
    border-top: 2px dashed #eee;
    justify-content: flex-end;
    flex-wrap: wrap;
}
.btn-action {
    padding: 8px 15px;
    border: none;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    color: white;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
.btn-warning { background: #f09433; }
.btn-warning:hover { background: #d97b20; }
.btn-dark { background: #343a40; }
.btn-dark:hover { background: #23272b; }
.btn-success-alt { background: #20c997; }
.btn-success-alt:hover { background: #17a2b8; }
.btn-danger { background: #dc3545; }
.btn-danger:hover { background: #c82333; }

    </style>
</head>
<body>

    <div class="crm-header">
    <h1>AyuMed CRM Master</h1>
    <div style="display: flex; gap: 20px; align-items: center;">
        <a href="https://prathuuu294.pythonanywhere.com/admin" style="color: var(--navy-900); background: var(--gold); padding: 8px 15px; text-decoration: none; font-weight: 700; border-radius: 4px; font-size: 0.9rem; transition: 0.3s;">
            ⬅ Back to Main Admin
        </a>
        <div style="font-weight: 600; opacity: 0.8;">Enterprise CRM</div>
    </div>
</div>

    <div class="container" id="leadsContainer">
        <h2 style="text-align: center; color: #666; margin-top: 50px;">Loading student data...</h2>
    </div>

        <script>
        const STAGES = [
            "1) Profile Active", 
            "4) Documents Pending",
            "4) Documents Verification", 
            "4) Documents Verified", 
            "5) Payment Pending", 
            "5) Payment Confirmed", 
            "6) Counselling In Progress", 
            "6) Preference List Ready", 
            "7) Seat Allotted", 
            "8) Admission Complete"
        ];
        
        const COUNSELLORS = ["Unassigned", "Aditya", "Mahesh", "Yatharth", "Prathamesh"];

        // --- GLOBAL DOCUMENT LISTS FOR ADMIN OVERRIDE ---
        const universalDocs = [
            { id: 'doc_admit', label: 'NEET UG Admit Card' }, { id: 'doc_score', label: 'NEET UG Scorecard' },
            { id: 'doc_10th', label: 'Class 10th Marksheet' }, { id: 'doc_12th', label: 'Class 12th Marksheet' },
            { id: 'doc_aadhar', label: 'Aadhar Card' }, { id: 'doc_passbook', label: 'Bank Passbook Front Page' },
            { id: 'doc_migration', label: 'Migration Certificate' }, { id: 'doc_photo', label: 'Passport Size Photo' }
        ];

        const stateSpecificDocs = {
            'MP': [{ id: 'doc_mp_dom', label: 'MP Domicile Certificate' }, { id: 'doc_mp_samagra', label: 'Samagra ID' }, { id: 'doc_mp_char', label: 'MP Character Certificate' }, { id: 'doc_mp_med', label: 'MP Medical Fitness' }],
            'MH': [{ id: 'doc_mh_dom', label: 'Maharashtra Domicile' }, { id: 'doc_mh_nat', label: 'Nationality Certificate' }], // Corrected MH list!
            'UP': [{ id: 'doc_up_dom', label: 'UP Domicile Certificate' }, { id: 'doc_up_tc', label: 'UP Transfer Certificate' }],
            'RJ': [{ id: 'doc_rj_dom', label: 'Rajasthan Domicile' }],
            'GJ': [{ id: 'doc_gj_dom', label: 'Gujarat Domicile' }]
        };

        const categoryDocs = {
            'EWS': [{ id: 'doc_ews', label: 'EWS Certificate (Current FY)' }],
            'OBC': [{ id: 'doc_caste', label: 'Caste Certificate' }, { id: 'doc_validity', label: 'Caste Validity Certificate' }, { id: 'doc_ncl', label: 'Non-Creamy Layer (NCL)' }],
            'SC_ST': [{ id: 'doc_caste', label: 'Caste Certificate' }, { id: 'doc_validity', label: 'Caste Validity Certificate' }]
        };

        const specialQuotaDocs = {
            'PWD': [{ id: 'doc_pwd', label: 'Disability Certificate (NEET)' }],
            'DEF': [{ id: 'doc_def', label: 'Defence Certificate' }],
            'MIN': [{ id: 'doc_min', label: 'Minority Certificate' }],
            'ORP': [{ id: 'doc_orp', label: 'Orphan Certificate' }],
            'HA': [{ id: 'doc_ha_dom', label: 'HA Domicile' }, { id: 'doc_ha_school', label: 'HA School Proof' }],
            'MKB': [{ id: 'doc_mkb_disp', label: 'Disputed Area' }, { id: 'doc_mkb_lang', label: 'Mother Tongue' }, { id: 'doc_mkb_school', label: 'MKB School Proof' }]
        };

        async function loadLeads() {
            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/leads');
                const data = await response.json();
                
                const container = document.getElementById('leadsContainer');
                container.innerHTML = ''; 

                if(data.leads.length === 0) {
                    container.innerHTML = '<h3 style="text-align:center;">No registered students yet.</h3>';
                    return;
                }

                data.leads.forEach(lead => {
                    const card = document.createElement('div');
                    card.className = 'lead-card';

                    const docs = lead.documents || {};
                    let docHtml = '';
                    let requiredDocs = [];
                    
                    if (lead.required_docs_list) {
                        try {
                            requiredDocs = typeof lead.required_docs_list === 'string' ? JSON.parse(lead.required_docs_list) : lead.required_docs_list;
                        } catch(e) { console.error("Parse error", e); }
                    }

                    if (Array.isArray(requiredDocs) && requiredDocs.length > 0) {
                        requiredDocs.forEach(doc => {
                            const isUploaded = docs[doc.id] === true;
                            docHtml += `
                                <a href="https://prathuuu294.pythonanywhere.com/api/admin/download_doc?email=${lead.email}&doc_type=${doc.id}" 
                                   target="_blank" class="doc-badge ${isUploaded ? 'doc-yes' : 'doc-no'}" title="${doc.label}">
                                    ${doc.label}
                                </a>
                            `;
                        });
                    } else {
                        docHtml = `<span style="font-size:0.8rem; color:#999; font-style:italic;">Student hasn't confirmed counselling jurisdictions yet.</span>`;
                    }

                    let stageOptions = '';
                    STAGES.forEach(s => { stageOptions += `<option value="${s}" ${lead.lead_stage === s ? 'selected' : ''}>${s}</option>`; });

                    let counsellorOptions = '';
                    COUNSELLORS.forEach(c => { counsellorOptions += `<option value="${c}" ${lead.assigned_counsellor === c ? 'selected' : ''}>${c}</option>`; });

                    const waMessage = encodeURIComponent(`Hello ${lead.full_name.split(' ')[0]}, this is AyuMed Counselling. We are checking in on your admission process!`);

                    card.innerHTML = `
                        <div class="lead-info">
                            <h3>${lead.full_name}</h3>
                            <p><strong>Email:</strong> ${lead.email}</p>
                            <p><strong>Phone:</strong> ${lead.phone}</p>
                            <p><strong>Registered:</strong> ${new Date(lead.created_at).toLocaleDateString()}</p>
                            <a href="https://wa.me/91${lead.phone.replace(/\D/g,'')}?text=${waMessage}" target="_blank" class="btn-wa">Chat on WhatsApp</a>
                            <div style="margin-top: 15px;">
                                <p style="font-weight:600; margin-bottom:5px;">Uploaded Documents:</p>
                                ${docHtml}
                            </div>
                        </div>

                        <div>
                            <label style="font-size: 0.8rem; font-weight: 600;">Admission Stage:</label>
                            <select class="form-control" id="stage_${lead.id}">${stageOptions}</select>
                            <label style="font-size: 0.8rem; font-weight: 600;">Assigned To:</label>
                            <select class="form-control" id="counsellor_${lead.id}">${counsellorOptions}</select>
                        </div>

                        <div>
                            <label style="font-size: 0.8rem; font-weight: 600;">Internal Notes:</label>
                            <textarea class="form-control" id="notes_${lead.id}" placeholder="E.g. Wants Maharashtra. Call after 6 PM.">${lead.counsellor_notes || ''}</textarea>
                            <label style="font-size: 0.8rem; font-weight: 600; margin-top:10px; display:block;">Pending Fee (₹):</label>
                            <input type="number" class="form-control" id="fee_${lead.id}" value="${lead.fee_amount || 0}" placeholder="e.g. 5000">
                        </div>

                        <div>
                            <button class="btn-update" onclick="updateLead('${lead.email}', ${lead.id})">Save Changes</button>
                            <p id="status_${lead.id}" style="font-size: 0.8rem; text-align: center; margin-top: 10px; color: var(--success); display: none;">Saved!</p>
                        </div>

                        <!-- Smart Preference List Uploader -->
                        <div style="grid-column: 1 / -1; background: #fafafa; border: 1px solid #ddd; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-top: 10px;">
                            <div>
                                <h4 style="margin-bottom: 5px; color: var(--navy-900);"><i class="fas fa-file-pdf" style="color: #dc3545;"></i> Deliver Preference List</h4>
                                <p style="font-size: 0.8rem; color: #666;">Securely push the custom PDF to the student's dashboard.</p>
                            </div>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                ${lead.documents.preference_list ? 
                                    `
                                    <span style="color: #20c997; font-weight: 700; font-size: 0.85rem; margin-right: 10px;"><i class="fas fa-check-circle"></i> Delivered</span>
                                    <a href="https://prathuuu294.pythonanywhere.com/api/admin/download_doc?email=${lead.email}&doc_type=preference_list" target="_blank" style="background: var(--navy-900); color: var(--gold); padding: 8px 15px; text-decoration: none; font-size: 0.85rem; font-weight: 700; border-radius: 4px; transition: 0.3s;"><i class="fas fa-eye"></i> View List</a>
                                    <button class="btn-action btn-danger" onclick="deletePreferenceList('${lead.email}')"><i class="fas fa-trash"></i> Remove</button>
                                    ` : `
                                    <input type="file" id="pref_file_${lead.id}" accept=".pdf" style="font-size: 0.85rem; max-width: 200px;">
                                    <button class="btn-action btn-success-alt" onclick="uploadPreferenceList('${lead.email}', ${lead.id})" id="pref_btn_${lead.id}"><i class="fas fa-cloud-upload-alt"></i> Upload</button>
                                    `
                                }
                            </div>
                        </div>

                        <!-- NEW: Admin Override: Set Student Preferences -->
                        <div style="grid-column: 1 / -1; background: rgba(212, 175, 55, 0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 6px; margin-top: 10px;">
                            <h4 style="margin-bottom: 10px; color: var(--navy-900); border-bottom: 1px solid #ccc; padding-bottom: 5px;"><i class="fas fa-user-cog"></i> Admin Override: Setup Student's Dashboard Requirements</h4>
                            
                            <div style="display: flex; flex-wrap: wrap; gap: 20px;">
                                <!-- Quotas -->
                                <div style="flex: 1; min-width: 200px;">
                                    <p style="font-size: 0.8rem; font-weight: 700; margin-bottom: 5px;">1. Target Jurisdictions</p>
                                    <label style="font-size: 0.8rem; font-weight: 600; margin-right: 10px;"><input type="checkbox" id="aiq_${lead.id}"> AIQ</label>
                                    <label style="font-size: 0.8rem; font-weight: 600;"><input type="checkbox" id="state_${lead.id}" onchange="document.getElementById('stateList_${lead.id}').style.display = this.checked ? 'block' : 'none';"> State (85%)</label>
                                    
                                    <div id="stateList_${lead.id}" style="display: none; padding-left: 10px; margin-top: 5px; border-left: 2px solid var(--gold);">
                                        <label style="font-size: 0.75rem; margin-right: 5px;"><input type="checkbox" class="state-chk_${lead.id}" value="MP"> MP</label>
                                        <label style="font-size: 0.75rem; margin-right: 5px;"><input type="checkbox" class="state-chk_${lead.id}" value="MH"> MH</label>
                                        <label style="font-size: 0.75rem; margin-right: 5px;"><input type="checkbox" class="state-chk_${lead.id}" value="UP"> UP</label>
                                        <label style="font-size: 0.75rem; margin-right: 5px;"><input type="checkbox" class="state-chk_${lead.id}" value="RJ"> RJ</label>
                                        <label style="font-size: 0.75rem;"><input type="checkbox" class="state-chk_${lead.id}" value="GJ"> GJ</label>
                                    </div>
                                </div>

                                <!-- Category -->
                                <div style="flex: 1; min-width: 180px;">
                                    <p style="font-size: 0.8rem; font-weight: 700; margin-bottom: 5px;">2. Main Category</p>
                                    <select id="cat_${lead.id}" class="form-control" style="font-size: 0.8rem; padding: 5px;">
                                        <option value="">-- Select Category --</option>
                                        <option value="UR">UR / General</option>
                                        <option value="EWS">EWS</option>
                                        <option value="OBC">OBC/SEBC/VJ/NT</option>
                                        <option value="SC_ST">SC / ST</option>
                                    </select>
                                </div>

                                <!-- Special Quotas -->
                                <div style="flex: 2; min-width: 250px;">
                                    <p style="font-size: 0.8rem; font-weight: 700; margin-bottom: 5px;">3. Special Quotas</p>
                                    <div style="display: flex; flex-wrap: wrap; gap: 8px; background: #fff; padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
                                        <label style="font-size: 0.75rem; font-weight: 700; color: #d9534f;"><input type="checkbox" id="quotaNone_${lead.id}" value="NONE" onchange="toggleNone(${lead.id}, this.checked)"> None</label>
                                        <label style="font-size: 0.75rem;"><input type="checkbox" class="quota-chk_${lead.id}" value="PWD" onchange="uncheckNone(${lead.id})"> PwD</label>
                                        <label style="font-size: 0.75rem;"><input type="checkbox" class="quota-chk_${lead.id}" value="DEF" onchange="uncheckNone(${lead.id})"> DEF</label>
                                        <label style="font-size: 0.75rem;"><input type="checkbox" class="quota-chk_${lead.id}" value="MIN" onchange="uncheckNone(${lead.id})"> MIN</label>
                                        <label style="font-size: 0.75rem;"><input type="checkbox" class="quota-chk_${lead.id}" value="ORP" onchange="uncheckNone(${lead.id})"> ORP</label>
                                        <label style="font-size: 0.75rem;"><input type="checkbox" class="quota-chk_${lead.id}" value="HA" onchange="uncheckNone(${lead.id})"> HA</label>
                                        <label style="font-size: 0.75rem;"><input type="checkbox" class="quota-chk_${lead.id}" value="MKB" onchange="uncheckNone(${lead.id})"> MKB</label>
                                    </div>
                                </div>
                            </div>
                            
                            <div style="text-align: right; margin-top: 10px;">
                                <button class="btn-action btn-dark" onclick="forceUpdatePrefs(event, '${lead.email}', ${lead.id})">
                                    <i class="fas fa-sync-alt"></i> Force Sync to Student Dashboard
                                </button>
                            </div>
                        </div>

                        <!-- Admin Actions Toolbar -->
                        <div class="admin-actions">
                            <button class="btn-action btn-warning" onclick="resetUserPassword('${lead.email}')"><i class="fas fa-key"></i> Reset Password</button>
                            ${lead.is_locked ? 
                                `<button class="btn-action btn-success-alt" onclick="toggleUserLock('${lead.email}', 'unlock')"><i class="fas fa-unlock"></i> Unlock Login</button>` : 
                                `<button class="btn-action btn-dark" onclick="toggleUserLock('${lead.email}', 'lock')"><i class="fas fa-lock"></i> Lock Login</button>`
                            }
                            <button class="btn-action btn-danger" onclick="deleteUserAccount('${lead.email}')"><i class="fas fa-trash"></i> Delete Account</button>
                        </div>
                    `;

                    container.appendChild(card);
                });

            } catch (error) { console.error("Error loading leads:", error); }
        }

        // --- EXCLUSIVITY LOGIC FOR DYNAMIC OVERRIDE ---
        function toggleNone(id, isChecked) {
            if (isChecked) {
                document.querySelectorAll(`.quota-chk_${id}`).forEach(chk => chk.checked = false);
            }
        }
        function uncheckNone(id) {
            const noneChk = document.getElementById(`quotaNone_${id}`);
            if (noneChk) noneChk.checked = false;
        }

        // --- FORCE SYNC LOGIC ---
        async function forceUpdatePrefs(event, email, id) {
            const isAIQ = document.getElementById(`aiq_${id}`).checked;
            const isState = document.getElementById(`state_${id}`).checked;
            const selectedStates = Array.from(document.querySelectorAll(`.state-chk_${id}:checked`)).map(chk => chk.value);
            const category = document.getElementById(`cat_${id}`).value;
            const selectedQuotas = Array.from(document.querySelectorAll(`.quota-chk_${id}:checked`)).map(chk => chk.value);
            
            const noneChk = document.getElementById(`quotaNone_${id}`);
            if (noneChk && noneChk.checked) selectedQuotas.push('NONE');

            if (!isAIQ && (!isState || selectedStates.length === 0)) return alert("Please select at least one Target Jurisdiction (AIQ or State).");
            if (!category) return alert("Please select a Main Category.");
            if (selectedQuotas.length === 0) return alert("Please specify Special Quotas, or explicitly choose 'None'.");

            const prefs = { aiq: isAIQ, state: isState, states: selectedStates, category: category, quotas: selectedQuotas };

            let reqDocs = [...universalDocs];
            if (prefs.state && prefs.states) {
                prefs.states.forEach(s => { if (stateSpecificDocs[s]) reqDocs.push(...stateSpecificDocs[s]); });
            }
            if (prefs.category && categoryDocs[prefs.category]) {
                reqDocs.push(...categoryDocs[prefs.category]);
            }
            if (prefs.quotas && prefs.quotas.length > 0) {
                prefs.quotas.forEach(q => { if (specialQuotaDocs[q]) reqDocs.push(...specialQuotaDocs[q]); });
            }

            const uniqueDocs = Array.from(new Set(reqDocs.map(a => a.id))).map(docId => reqDocs.find(a => a.id === docId));
            const requiredDocsList = uniqueDocs.map(d => ({ id: d.id, label: d.label }));

            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Syncing...';
            btn.style.pointerEvents = 'none';

            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/update_counselling_prefs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, prefs: prefs, required_docs: requiredDocsList })
                });
                
                if (response.ok) {
                    alert("✅ Success! The student's dashboard has been forcefully updated to request these specific documents.");
                    loadLeads(); // Reload the leads to show the new required documents list immediately!
                } else {
                    alert("Failed to update on server.");
                    btn.innerHTML = originalText;
                    btn.style.pointerEvents = 'auto';
                }
            } catch(e) {
                alert("Network Error.");
                btn.innerHTML = originalText;
                btn.style.pointerEvents = 'auto';
            }
        }

        // --- EXISTING CRM LOGIC ---
        async function updateLead(email, id) {
            const stage = document.getElementById(`stage_${id}`).value;
            const counsellor = document.getElementById(`counsellor_${id}`).value;
            const notes = document.getElementById(`notes_${id}`).value;
            const fee = document.getElementById(`fee_${id}`).value || 0; 
            
            const btn = document.querySelector(`#status_${id}`).previousElementSibling;
            btn.innerText = "Saving...";

            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/update_lead', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, stage, notes, counsellor, fee }) 
                });

                if(response.ok) {
                    btn.innerText = "Save Changes";
                    const statusMsg = document.getElementById(`status_${id}`);
                    statusMsg.style.display = "block";
                    setTimeout(() => { statusMsg.style.display = "none"; }, 2000);
                } else throw new Error("Server rejected save");
            } catch (error) {
                alert("Error saving data! Check server logs.");
                btn.innerText = "Save Changes";
            }
        }

        async function resetUserPassword(email) {
            if(!confirm(`Are you sure you want to reset the password for ${email}?`)) return;
            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/reset_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const result = await response.json();
                if(response.ok) alert(`✅ SUCCESS\n\nThe new temporary password is:\n${result.new_password}\n\nPlease copy this and send it to the student.`);
                else alert("Failed: " + result.message);
            } catch(e) { alert("Network error connecting to server."); }
        }

        async function toggleUserLock(email, action) {
            if(!confirm(`Are you sure you want to ${action.toUpperCase()} the account for ${email}?`)) return;
            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/toggle_lock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, action })
                });
                if(response.ok) { alert(`Account successfully ${action}ed!`); loadLeads(); }
                else alert("Failed to update lock status.");
            } catch(e) { alert("Network error connecting to server."); }
        }

        async function deleteUserAccount(email) {
            if(!confirm(`🚨 CRITICAL WARNING 🚨\n\nAre you sure you want to PERMANENTLY DELETE ${email}?\nThis will erase their profile, documents, and history. This CANNOT be undone!`)) return;
            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/delete_user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                if(response.ok) { alert("Account permanently deleted."); loadLeads(); }
                else alert("Failed to delete account.");
            } catch(e) { alert("Network error connecting to server."); }
        }

        async function uploadPreferenceList(email, id) {
            const fileInput = document.getElementById(`pref_file_${id}`);
            const btn = document.getElementById(`pref_btn_${id}`);
            
            if(fileInput.files.length === 0) return alert("Please select a PDF file first!");
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            btn.style.pointerEvents = 'none';

            const formData = new FormData();
            formData.append('email', email);
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/upload_preference', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if(response.ok) { alert("✅ PDF Delivered Successfully!"); loadLeads(); }
                else { alert("Upload failed: " + result.message); btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Upload'; btn.style.pointerEvents = 'auto'; }
            } catch(e) { alert("Network error."); btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Upload'; btn.style.pointerEvents = 'auto'; }
        }

        async function deletePreferenceList(email) {
            if(!confirm("Are you sure you want to delete this preference list?")) return;
            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/delete_preference', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                if(response.ok) { alert("🗑️ Preference List securely removed."); loadLeads(); }
                else alert("Failed to delete file.");
            } catch(e) { alert("Network error connecting to server."); }
        }

        // Initialize
        loadLeads();
    </script>
</body>
