<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyuMed | CRM Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-900: #0D1B2A; 
            --gold: #D4AF37;     
            --cream: #F7F3E9;    
            --success: #25D366;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f7f6; color: var(--navy-900); padding-bottom: 50px; }
        
        .crm-header {
            background: var(--navy-900);
            padding: 20px 40px;
            color: var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--gold);
        }
        .crm-header h1 { font-family: 'Playfair Display', serif; }
        
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        
        .lead-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid var(--gold);
            display: grid;
            grid-template-columns: 2fr 1.5fr 2fr 1fr;
            gap: 20px;
            align-items: start;
        }
        
        .lead-info h3 { font-size: 1.2rem; margin-bottom: 5px; color: var(--navy-900); }
        .lead-info p { font-size: 0.85rem; color: #555; margin-bottom: 3px; }
        
        .form-control {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        textarea.form-control { resize: vertical; min-height: 80px; }
        
        .btn-update {
            background: var(--navy-900);
            color: var(--gold);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }
        .btn-update:hover { background: var(--gold); color: var(--navy-900); }
        
        .btn-wa {
            display: inline-block;
            background: var(--success);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .doc-badge {
            display: inline-block;
            padding: 5px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            margin-right: 5px;
            margin-bottom: 5px;
            text-decoration: none;
        }
        .doc-yes { background: rgba(37, 211, 102, 0.15); color: #1da851; border: 1px solid #1da851; }
        .doc-no { background: #eee; color: #999; border: 1px solid #ddd; pointer-events: none; }
        
        .doc-yes:hover { background: #1da851; color: white; }

        @media(max-width: 900px) {
            .lead-card { grid-template-columns: 1fr; }
        }
/* CRM Admin Action Toolbar */
.admin-actions {
    grid-column: 1 / -1; 
    display: flex;
    gap: 15px;
    margin-top: 15px;
    padding-top: 15px;
    border-top: 2px dashed #eee;
    justify-content: flex-end;
    flex-wrap: wrap;
}
.btn-action {
    padding: 8px 15px;
    border: none;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    color: white;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
.btn-warning { background: #f09433; }
.btn-warning:hover { background: #d97b20; }
.btn-dark { background: #343a40; }
.btn-dark:hover { background: #23272b; }
.btn-success-alt { background: #20c997; }
.btn-success-alt:hover { background: #17a2b8; }
.btn-danger { background: #dc3545; }
.btn-danger:hover { background: #c82333; }

    </style>
</head>
<body>

    <div class="crm-header">
    <h1>AyuMed CRM Master</h1>
    <div style="display: flex; gap: 20px; align-items: center;">
        <a href="https://prathuuu294.pythonanywhere.com/admin" style="color: var(--navy-900); background: var(--gold); padding: 8px 15px; text-decoration: none; font-weight: 700; border-radius: 4px; font-size: 0.9rem; transition: 0.3s;">
            ⬅ Back to Main Admin
        </a>
        <div style="font-weight: 600; opacity: 0.8;">Enterprise CRM</div>
    </div>
</div>

    <div class="container" id="leadsContainer">
        <h2 style="text-align: center; color: #666; margin-top: 50px;">Loading student data...</h2>
    </div>

    <script>
                const STAGES = [
            "1) Profile Active", 
            "4) Documents Pending", 
            "4) Documents Verified", 
            "5) Payment Pending", 
            "5) Payment Confirmed", 
            "6) Counselling In Progress", 
            "6) Preference List Ready", 
            "7) Seat Allotted", 
            "8) Admission Complete"
        ];
        
        const COUNSELLORS = ["Unassigned", "Aditya", "Mahesh", "Yatharth", "Prathamesh"];

        async function loadLeads() {
            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/leads');
                const data = await response.json();
                
                const container = document.getElementById('leadsContainer');
                container.innerHTML = ''; // Clear loading text

                if(data.leads.length === 0) {
                    container.innerHTML = '<h3 style="text-align:center;">No registered students yet.</h3>';
                    return;
                }

                data.leads.forEach(lead => {
                    const card = document.createElement('div');
                    card.className = 'lead-card';

                    // Formatting documents
                    const docs = lead.documents;
                    const docHtml = `
                        <a href="https://prathuuu294.pythonanywhere.com/api/admin/download_doc?email=${lead.email}&doc_type=neet_scorecard" target="_blank" class="doc-badge ${docs.neet_scorecard ? 'doc-yes' : 'doc-no'}">Scorecard</a>
                        <a href="https://prathuuu294.pythonanywhere.com/api/admin/download_doc?email=${lead.email}&doc_type=neet_admit_card" target="_blank" class="doc-badge ${docs.neet_admit_card ? 'doc-yes' : 'doc-no'}">Admit Card</a>
                        <a href="https://prathuuu294.pythonanywhere.com/api/admin/download_doc?email=${lead.email}&doc_type=domicile_certificate" target="_blank" class="doc-badge ${docs.domicile_certificate ? 'doc-yes' : 'doc-no'}">Domicile</a>
                        <a href="https://prathuuu294.pythonanywhere.com/api/admin/download_doc?email=${lead.email}&doc_type=caste_certificate" target="_blank" class="doc-badge ${docs.caste_certificate ? 'doc-yes' : 'doc-no'}">Caste Cert</a>
                    `;

                    // Generate Stage Options
                    let stageOptions = '';
                    STAGES.forEach(s => {
                        stageOptions += `<option value="${s}" ${lead.lead_stage === s ? 'selected' : ''}>${s}</option>`;
                    });

                    // Generate Counsellor Options
                    let counsellorOptions = '';
                    COUNSELLORS.forEach(c => {
                        counsellorOptions += `<option value="${c}" ${lead.assigned_counsellor === c ? 'selected' : ''}>${c}</option>`;
                    });

                    // Pre-filled WhatsApp message
                    const waMessage = encodeURIComponent(`Hello ${lead.full_name.split(' ')[0]}, this is AyuMed Counselling. We are checking in on your admission process!`);

                    card.innerHTML = `
                        <div class="lead-info">
                            <h3>${lead.full_name}</h3>
                            <p><strong>Email:</strong> ${lead.email}</p>
                            <p><strong>Phone:</strong> ${lead.phone}</p>
                            <p><strong>Registered:</strong> ${new Date(lead.created_at).toLocaleDateString()}</p>
                            <a href="https://wa.me/91${lead.phone.replace(/\D/g,'')}?text=${waMessage}" target="_blank" class="btn-wa">Chat on WhatsApp</a>
                            
                            <div style="margin-top: 15px;">
                                <p style="font-weight:600; margin-bottom:5px;">Uploaded Documents:</p>
                                ${docHtml}
                            </div>
                        </div>

                        <div>
                            <label style="font-size: 0.8rem; font-weight: 600;">Admission Stage:</label>
                            <select class="form-control" id="stage_${lead.id}">${stageOptions}</select>
                            
                            <label style="font-size: 0.8rem; font-weight: 600;">Assigned To:</label>
                            <select class="form-control" id="counsellor_${lead.id}">${counsellorOptions}</select>
                        </div>

                        <div>
    <label style="font-size: 0.8rem; font-weight: 600;">Internal Notes:</label>
    <textarea class="crm-form-control" id="notes_${lead.id}" placeholder="E.g. Wants Maharashtra. Call after 6 PM.">${lead.counsellor_notes || ''}</textarea>
    
    <label style="font-size: 0.8rem; font-weight: 600; margin-top:10px; display:block;">Pending Fee (₹):</label>
    <input type="number" class="crm-form-control" id="fee_${lead.id}" value="${lead.fee_amount || 0}" placeholder="e.g. 5000">
</div>


                        <div>
                            <button class="btn-update" onclick="updateLead('${lead.email}', ${lead.id})">Save Changes</button>
                                                    <p id="status_${lead.id}" style="font-size: 0.8rem; text-align: center; margin-top: 10px; color: var(--success); display: none;">Saved!</p>
                    </div>

                        <div style="grid-column: 1 / -1; background: #fafafa; border: 1px solid #ddd; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-top: 10px;">
                            <div>
                                <h4 style="margin-bottom: 5px; color: var(--navy-900);"><i class="fas fa-file-pdf" style="color: #dc3545;"></i> Deliver Preference List</h4>
                                <p style="font-size: 0.8rem; color: #666;">Securely push the custom PDF to the student's dashboard and auto-unlock their Counselling tab.</p>
                            </div>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <input type="file" id="pref_file_${lead.id}" accept=".pdf" style="font-size: 0.85rem; max-width: 200px;">
                                <button class="btn-action btn-success-alt" onclick="uploadPreferenceList('${lead.email}', ${lead.id})" id="pref_btn_${lead.id}">
                                    <i class="fas fa-cloud-upload-alt"></i> Upload & Deliver
                                </button>
                            </div>
                        </div>


                    <!-- NEW: Admin Actions Toolbar -->
                    <div class="admin-actions">
                        <button class="btn-action btn-warning" onclick="resetUserPassword('${lead.email}')">
                            <i class="fas fa-key"></i> Reset Password
                        </button>
                        
                        ${lead.is_locked ? 
                            `<button class="btn-action btn-success-alt" onclick="toggleUserLock('${lead.email}', 'unlock')"><i class="fas fa-unlock"></i> Unlock Login</button>` : 
                            `<button class="btn-action btn-dark" onclick="toggleUserLock('${lead.email}', 'lock')"><i class="fas fa-lock"></i> Lock Login</button>`
                        }
                        
                        <button class="btn-action btn-danger" onclick="deleteUserAccount('${lead.email}')">
                            <i class="fas fa-trash"></i> Delete Account
                        </button>
                    </div>
                `;

                    container.appendChild(card);
                });

            } catch (error) {
                console.error("Error loading leads:", error);
            }
        }

                async function updateLead(email, id) {
            const stage = document.getElementById(`stage_${id}`).value;
            const counsellor = document.getElementById(`counsellor_${id}`).value;
            const notes = document.getElementById(`notes_${id}`).value;
            // Grab the fee from the text box!
            const fee = document.getElementById(`fee_${id}`).value || 0; 
            
            const btn = document.querySelector(`#status_${id}`).previousElementSibling;
            btn.innerText = "Saving...";

            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/update_lead', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Send the fee inside the payload!
                    body: JSON.stringify({ email, stage, notes, counsellor, fee }) 
                });

                if(response.ok) {
                    btn.innerText = "Save Changes";
                    const statusMsg = document.getElementById(`status_${id}`);
                    statusMsg.style.display = "block";
                    setTimeout(() => { statusMsg.style.display = "none"; }, 2000);
                } else {
                    throw new Error("Server rejected save");
                }
            } catch (error) {
                alert("Error saving data! Check server logs.");
                btn.innerText = "Save Changes";
            }
        }

        // --- ADMIN ACTION FUNCTIONS ---

        async function resetUserPassword(email) {
            if(!confirm(`Are you sure you want to reset the password for ${email}?`)) return;
            
            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/reset_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const result = await response.json();
                
                if(response.ok) {
                    // This creates an alert pop-up with the new temporary password so you can copy it
                    alert(`✅ SUCCESS\n\nThe new temporary password is:\n${result.new_password}\n\nPlease copy this and send it to the student.`);
                } else alert("Failed: " + result.message);
            } catch(e) { alert("Network error connecting to server."); }
        }

        async function toggleUserLock(email, action) {
            if(!confirm(`Are you sure you want to ${action.toUpperCase()} the account for ${email}?`)) return;

            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/toggle_lock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, action })
                });
                
                if(response.ok) {
                    alert(`Account successfully ${action}ed!`);
                    loadLeads(); // Refreshes the page to swap the lock/unlock button
                } else alert("Failed to update lock status.");
            } catch(e) { alert("Network error connecting to server."); }
        }

        async function deleteUserAccount(email) {
            if(!confirm(`🚨 CRITICAL WARNING 🚨\n\nAre you sure you want to PERMANENTLY DELETE ${email}?\nThis will erase their profile, documents, and history. This CANNOT be undone!`)) return;

            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/delete_user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                if(response.ok) {
                    alert("Account permanently deleted.");
                    loadLeads(); // Refreshes the page to remove the user card
                } else alert("Failed to delete account.");
            } catch(e) { alert("Network error connecting to server."); }
        }

        async function uploadPreferenceList(email, id) {
            const fileInput = document.getElementById(`pref_file_${id}`);
            const btn = document.getElementById(`pref_btn_${id}`);
            
            if(fileInput.files.length === 0) {
                alert("Please select a PDF file first!");
                return;
            }
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            btn.style.pointerEvents = 'none';

            const formData = new FormData();
            formData.append('email', email);
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/admin/upload_preference', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if(response.ok) {
                    alert("✅ PDF Delivered Successfully! The student's dashboard is now unlocked.");
                    loadLeads(); // Refreshes page to update their stage automatically
                } else {
                    alert("Upload failed: " + result.message);
                    btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Upload & Deliver';
                    btn.style.pointerEvents = 'auto';
                }
            } catch(e) {
                alert("Network error.");
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Upload & Deliver';
                btn.style.pointerEvents = 'auto';
            }
        }

        // Initialize
        loadLeads();
    </script>
</body>
</html>
