<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyuMed | Student Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-900: #0D1B2A; 
            --gold: #D4AF37;     
            --cream: #F7F3E9;    
            --shadow-luxury: 0 15px 35px rgba(13, 27, 42, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-container {
            background: #FFFFFF;
            width: 100%;
            max-width: 450px;
            border-top: 4px solid var(--gold);
            border-radius: 12px;
            box-shadow: var(--shadow-luxury);
            padding: 40px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header img {
            width: 70px;
            margin-bottom: 15px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            padding: 2px;
        }
        .auth-header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--navy-900);
            font-size: 2.2rem;
            margin-bottom: 5px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            color: var(--navy-900);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--gold);
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--navy-900);
            color: var(--gold);
            border: none;
            border-radius: 6px;
            font-size: 1.05rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background: var(--gold);
            color: var(--navy-900);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }
        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--navy-900);
            font-weight: 700;
            text-decoration: none;
        }
        .error-message {
            color: #dc2743;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <img src="https://i.postimg.cc/zXZtfMHn/1000627648.jpg" alt="AyuMed Logo">
            <h1>Student Portal</h1>
        </div>

        <div id="errorMsg" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-submit">Secure Login</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register Here</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.querySelector('.btn-submit');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerText = 'Authenticating...';
            errorMsg.style.display = 'none';

            const data = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            try {
                const response = await fetch('https://prathuuu294.pythonanywhere.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                                if (response.ok) {
                    // Save the user's email securely in the browser
                    localStorage.setItem('studentEmail', document.getElementById('loginEmail').value);
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.innerText = result.message || 'Invalid credentials.';
                    errorMsg.style.display = 'block';
                    btn.innerText = 'Secure Login';
                }
            } catch (error) {
                errorMsg.innerText = 'Connection error. Please try again.';
                errorMsg.style.display = 'block';
                btn.innerText = 'Secure Login';
            }
        });
    </script>
</body>
</html>
